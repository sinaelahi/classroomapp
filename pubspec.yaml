name: dershane_app
description: Dershane öğrenci ve ödeme yönetim uygulaması.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.7.0

  # Local database
  drift: ^2.20.0
  drift_flutter: ^0.2.0

  # Fonksiyonel hata yönetimi (Either<Failure, T>)
  fpdart: ^1.1.0

  # Routing
  go_router: ^14.2.0

  # Formatlama
  intl: ^0.19.0

  # Masaüstü pencere yönetimi
  window_manager: ^0.4.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Kod üretimi (drift tabloları için)
  build_runner: ^2.4.11
  drift_dev: ^2.20.0

  # Test yardımcıları
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
